<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ModeIL — Map</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }
  html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #fcf9f5; color: #1c1c19; cursor: crosshair; }

  /* Nav */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(252,249,245,0.96); backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(198,198,198,0.2);
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.5rem 3rem; height: 72px;
  }
  .nav-logo { font-family: 'Epilogue', sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: -0.04em; text-transform: uppercase; text-decoration: none; color: #000; }
  .nav-links { display: flex; gap: 2.5rem; font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; }
  .nav-links a { color: rgba(0,0,0,0.35); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: #000; }
  .nav-links a.active { color: #000; border-bottom: 2px solid #000; padding-bottom: 2px; }

  /* Map */
  #map {
    position: fixed; top: 72px; left: 0; right: 0; bottom: 0;
    z-index: 1;
  }

  /* Leaflet overrides */
  .leaflet-container { background: #f0ede9; cursor: crosshair !important; }
  .leaflet-control-zoom a { border-radius: 0 !important; font-family: 'Space Grotesk', sans-serif; }
  .leaflet-control-attribution { font-family: 'Space Grotesk', sans-serif; font-size: 9px; letter-spacing: 0.05em; }

  /* Hide default zoom */
  .leaflet-control-zoom { display: none !important; }

  /* Search overlay */
  #map-search-wrap {
    position: fixed; top: 92px; left: 50%; transform: translateX(-50%);
    z-index: 600; width: min(520px, calc(100vw - 3rem));
  }
  #map-search-bar {
    display: flex; align-items: center;
    background: rgba(252,249,245,0.97); backdrop-filter: blur(10px);
    border: 1.5px solid #000;
    padding: 0 1rem;
    gap: 0.5rem;
  }
  #map-search-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem;
    letter-spacing: 0.15em; text-transform: uppercase; color: #000;
    padding: 0.9rem 0; cursor: text;
  }
  #map-search-input::placeholder { color: rgba(0,0,0,0.3); }
  #map-search-clear { background: none; border: none; cursor: pointer; opacity: 0.4; display: none; padding: 0; }
  #map-search-clear:hover { opacity: 1; }

  /* Search results dropdown */
  #map-search-results {
    background: rgba(252,249,245,0.98); border: 1.5px solid #000; border-top: none;
    max-height: 280px; overflow-y: auto; display: none;
  }
  .search-result-item {
    padding: 0.75rem 1rem; cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
    border-bottom: 1px solid rgba(198,198,198,0.3);
    transition: background 0.15s;
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: #f0ede9; }
  .sri-name { font-family: 'Epilogue', sans-serif; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; letter-spacing: -0.02em; }
  .sri-meta { font-family: 'Space Grotesk', sans-serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.45; }
  .no-results { padding: 1rem; font-family: 'Space Grotesk', sans-serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.35; text-align: center; }

  /* Zoom buttons */
  #zoom-controls {
    position: fixed; bottom: 2.5rem; right: 2rem;
    z-index: 600; display: flex; flex-direction: column; gap: 2px;
  }
  .zoom-btn {
    width: 40px; height: 40px;
    background: rgba(252,249,245,0.97); border: 1.5px solid #000;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.1rem; font-weight: 900;
    font-family: 'Space Grotesk', sans-serif;
    transition: background 0.15s;
    user-select: none;
  }
  .zoom-btn:hover { background: #000; color: #fcf9f5; }

  /* Dim unmatched pins */
  .map-pin.dimmed { opacity: 0.15; transform: scale(0.7); }

  /* Custom pin */
  .map-pin {
    width: 14px; height: 14px;
    background: #000;
    border: 2px solid #fcf9f5;
    box-shadow: 0 1px 6px rgba(0,0,0,0.35);
    transition: transform 0.15s, background 0.15s;
    cursor: pointer !important;
  }
  .map-pin:hover, .map-pin.active { background: #000; transform: scale(1.6); }
  .map-pin.featured { background: #000; border: 2px solid #fcf9f5; box-shadow: 0 1px 8px rgba(0,0,0,0.5); }

  /* Side panel */
  #panel {
    position: fixed; top: 72px; right: 0; bottom: 0;
    width: 400px; background: #fcf9f5;
    border-left: 1px solid rgba(198,198,198,0.3);
    z-index: 500; overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; flex-direction: column;
  }
  #panel.open { transform: translateX(0); }

  .panel-img {
    width: 100%; aspect-ratio: 1/1;
    object-fit: cover; display: block;
    background: #ebe8e4;
  }
  .panel-img-placeholder {
    width: 100%; aspect-ratio: 1/1;
    background: repeating-linear-gradient(-45deg, #ebe8e4, #ebe8e4 4px, #f6f3ef 4px, #f6f3ef 12px);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase; color: #aaa;
  }
  .panel-body { padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
  .panel-name { font-family: 'Epilogue', sans-serif; font-weight: 900; font-size: 2rem; text-transform: uppercase; letter-spacing: -0.03em; line-height: 1; }
  .panel-location { font-family: 'Space Grotesk', sans-serif; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.45; }
  .panel-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .panel-tag { font-family: 'Space Grotesk', sans-serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; border: 1px solid #c6c6c6; padding: 3px 8px; }
  .panel-desc { font-family: 'Inter', sans-serif; font-size: 0.8rem; line-height: 1.65; color: #474747; }
  .panel-link {
    font-family: 'Space Grotesk', sans-serif; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    text-decoration: underline; text-underline-offset: 4px; color: #000;
    display: flex; align-items: center; gap: 6px; width: fit-content;
    transition: opacity 0.2s;
  }
  .panel-link:hover { opacity: 0.4; }
  .panel-close {
    position: absolute; top: 1.25rem; right: 1.25rem;
    background: rgba(252,249,245,0.9); border: 1px solid #c6c6c6;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10; transition: background 0.2s;
  }
  .panel-close:hover { background: #ebe8e4; }

  /* Count badge */
  #map-count {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: rgba(252,249,245,0.92); border: 1px solid rgba(198,198,198,0.4);
    font-family: 'Space Grotesk', sans-serif; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase;
    padding: 8px 18px; z-index: 400; opacity: 0.7;
    pointer-events: none;
  }

  @media (max-width: 600px) {
    #panel { width: 100%; }
    nav { padding: 1.25rem 1.5rem; }
    .nav-links { gap: 1.5rem; }
  }
</style>
</head>

<div id="map-search-wrap">

<!-- Zoom buttons -->
<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>

</div>

// Init Leaflet map
const map = L.map('map', {
  center: [32.0800, 34.7820],
  zoom: 13,
  zoomControl: false,
});
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Panel refs
const panel = document.getElementById('panel');
const panelClose = document.getElementById('panel-close');
const panelName = document.getElementById('panel-name');
const panelLocation = document.getElementById('panel-location');
const panelTags = document.getElementById('panel-tags');
const panelDesc = document.getElementById('panel-desc');
const panelLink = document.getElementById('panel-link');
const panelImgWrap = document.getElementById('panel-img-wrap');

let activeMarker = null;

function openPanel(d) {
  panelName.textContent = d.name;
  panelLocation.textContent = d.city + ', Israel';
  panelTags.innerHTML = d.tags.map(t => `<span class="panel-tag">${t}</span>`).join('');
  panelDesc.textContent = d.desc;
  panelLink.href = d.url;
  if (d.img) {
    panelImgWrap.innerHTML = `<img class="panel-img" src="${d.img}" alt="${d.name}" onerror="this.parentElement.innerHTML='<div class=\'panel-img-placeholder\'>${d.name}</div>'"/>`;
  } else {
    panelImgWrap.innerHTML = `<div class="panel-img-placeholder">${d.name}</div>`;
  }
  panel.classList.add('open');
}

panelClose.addEventListener('click', () => {
  panel.classList.remove('open');
  if (activeMarker) {
    activeMarker._icon?.querySelector('.map-pin')?.classList.remove('active');
    activeMarker = null;
  }
});

// Custom icon factory
function makeIcon(featured) {
  return L.divIcon({
    className: '',
    html: `<div class="map-pin${featured ? ' featured' : ''}"></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

// Zoom buttons
document.getElementById('zoom-in').addEventListener('click', () => map.zoomIn());
document.getElementById('zoom-out').addEventListener('click', () => map.zoomOut());

// Search
const searchInput = document.getElementById('map-search-input');
const searchClear = document.getElementById('map-search-clear');
const searchResults = document.getElementById('map-search-results');
const markers = [];

function runSearch(q) {
  const query = q.trim().toLowerCase();
  searchClear.style.display = query ? 'block' : 'none';

  if (!query) {
    searchResults.style.display = 'none';
    markers.forEach(({pin}) => pin.classList.remove('dimmed'));
    return;
  }

  const matches = DESIGNERS.filter(d =>
    d.name.toLowerCase().includes(query) ||
    d.city.toLowerCase().includes(query) ||
    d.tags.some(t => t.toLowerCase().includes(query))
  );

  // Dim non-matching
  markers.forEach(({d, pin}) => {
    const match = matches.some(m => m.name === d.name);
    pin.classList.toggle('dimmed', !match);
  });

  // Show dropdown
  if (matches.length === 0) {
    searchResults.innerHTML = '<div class="no-results">No results found</div>';
  } else {
    searchResults.innerHTML = matches.map((d, i) =>
      `<div class="search-result-item" data-idx="${DESIGNERS.indexOf(d)}">
        <div class="sri-name">${d.name}</div>
        <div class="sri-meta">${d.city} · ${d.tags.slice(0,2).join(' · ')}</div>
      </div>`
    ).join('');
    searchResults.querySelectorAll('.search-result-item').forEach(item => {
      item.addEventListener('click', () => {
        const d = DESIGNERS[+item.dataset.idx];
        const m = markers.find(x => x.d.name === d.name);
        if (m) {
          map.setView([d.lat, d.lng], 15, {animate: true});
          setTimeout(() => m.marker.fire('click'), 400);
        }
        searchResults.style.display = 'none';
        searchInput.value = d.name;
        markers.forEach(({pin}) => pin.classList.remove('dimmed'));
      });
    });
  }
  searchResults.style.display = 'block';
}

searchInput.addEventListener('input', e => runSearch(e.target.value));
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  runSearch('');
  searchInput.focus();
});
document.addEventListener('click', e => {
  if (!e.target.closest('#map-search-wrap')) searchResults.style.display = 'none';
});

// Add markers
DESIGNERS.forEach(d => {
  const marker = L.marker([d.lat, d.lng], { icon: makeIcon(d.fav) }).addTo(map);
  const pin = marker._icon?.querySelector?.('.map-pin') || null;
  markers.push({ d, marker, get pin() { return marker._icon?.querySelector('.map-pin'); } });
  marker.on('click', () => {
    if (activeMarker && activeMarker !== marker) {
      activeMarker._icon?.querySelector('.map-pin')?.classList.remove('active');
    }
    activeMarker = marker;
    marker._icon?.querySelector('.map-pin')?.classList.add('active');
    openPanel(d);
    // Offset map center to account for panel
    const px = map.latLngToContainerPoint([d.lat, d.lng]);
    const offset = window.innerWidth < 600 ? 0 : 200;
    const newPx = L.point(px.x - offset, px.y);
    const newLatLng = map.containerPointToLatLng(newPx);
    map.panTo(newLatLng, { animate: true });
  });
});

document.getElementById('map-count').textContent = `${DESIGNERS.length} Locations`;
</script>
