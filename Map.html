// Init Leaflet map
const map = L.map('map', {
 center: [32.0800, 34.7820],
 zoom: 13,
 zoomControl: false,
});
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
 attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/attributions">CARTO</a>',
 subdomains: 'abcd',
 maxZoom: 19
}).addTo(map);

// Panel refs
const panel = document.getElementById('panel');
const panelClose = document.getElementById('panel-close');
const panelName = document.getElementById('panel-name');
const panelLocation = document.getElementById('panel-location');
const panelTags = document.getElementById('panel-tags');
const panelDesc = document.getElementById('panel-desc');
const panelLink = document.getElementById('panel-link');
const panelImgWrap = document.getElementById('panel-img-wrap');

let activeMarker = null;

// Map panel favorites
let MAP_FAVORITES = new Set(JSON.parse(localStorage.getItem('modeil-favs') || '[]'));

function togglePanelFav(btn, name) {
 btn.classList.remove('panel-heart-pulse');
 void btn.offsetWidth;
 btn.classList.add('panel-heart-pulse');
 const icon = btn.querySelector('.ph-icon');
 if (MAP_FAVORITES.has(name)) {
 MAP_FAVORITES.delete(name);
 btn.classList.remove('saved');
 icon.style.fontVariationSettings = "'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24";
 icon.style.color = '';
 btn.querySelector('span:last-child').textContent = 'Save';
 } else {
 MAP_FAVORITES.add(name);
 btn.classList.add('saved');
 icon.style.fontVariationSettings = "'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24";
 icon.style.color = '#B8748A';
 btn.querySelector('span:last-child').textContent = 'Saved';
 }
 localStorage.setItem('modeil-favs', JSON.stringify([...MAP_FAVORITES]));
}

function openPanel(d) {
 panelName.textContent = d.name;
 // Primary address
 if (d.addresses && d.addresses.length) {
 panelLocation.textContent = d.addresses[0];
 } else if (d.address) {
 panelLocation.textContent = d.address;
 } else {
 panelLocation.textContent = d.city + ', Israel';
 }
 panelTags.innerHTML = d.tags.map(t => `<span class="panel-tag">${t}</span>`).join('');
 panelDesc.textContent = d.desc;
 panelLink.href = d.url;

 // Image
 if (d.img) {
 panelImgWrap.innerHTML = `<img class="panel-img" src="${d.img}" alt="${d.name}" onerror="this.parentElement.innerHTML='<div class=\'panel-img-placeholder\'>${d.name}</div>'"/>`;
 } else {
 panelImgWrap.innerHTML = `<div class="panel-img-placeholder">${d.name}</div>`;
 }

 // Heart/Save
 const isSaved = MAP_FAVORITES.has(d.name);
 const favEl = document.getElementById('panel-fav');
 if (favEl) {
 const safeName = d.name.replace(/'/g, "\\'");
 favEl.innerHTML = `<button class="panel-heart-btn${isSaved ? ' saved' : ''}" onclick="togglePanelFav(this, '${safeName}')">
 <span class="material-symbols-outlined ph-icon" style="font-size:18px;${isSaved ? "font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;color:#e53e3e" : ''}">favorite</span>
 <span>${isSaved ? 'Saved' : 'Save'}</span>
 </button>`;
 }

 // Contact
 const contactEl = document.getElementById('panel-contact');
 if (contactEl) {
 if (d.phone || d.email) {
 let cHtml = '<div class="panel-section"><div class="panel-section-label">Contact</div>';
 if (d.phone) cHtml += `<div class="panel-contact-row"><a href="tel:${d.phone}">${d.phone}</a></div>`;
 if (d.email) cHtml += `<div class="panel-contact-row"><a href="mailto:${d.email}">${d.email}</a></div>`;
 cHtml += '</div>';
 contactEl.innerHTML = cHtml;
 contactEl.style.display = 'block';
 } else { contactEl.style.display = 'none'; }
 }

 // Extra locations
 const locEl = document.getElementById('panel-extra-locations');
 if (locEl) {
 if (d.addresses && d.addresses.length > 1) {
 let lHtml = '<div class="panel-section"><div class="panel-section-label">All Locations</div>';
 d.addresses.forEach(addr => {

function makeIcon(featured) {

// Search
const searchInput = document.getElementById('map-search-input');
const searchClear = document.getElementById('map-search-clear');
const searchResults = document.getElementById('map-search-results');
const markers = [];

// Haversine distance in km
function distKm(lat1, lng1, lat2, lng2) {
 const R = 6371;
 const dLat = (lat2-lat1)*Math.PI/180;
 const dLng = (lng2-lng1)*Math.PI/180;
 const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
 return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

const ALL_TAGS = ["Jewelry","Artisan","Luxury","Sustainable","Streetwear","Minimalist","Knitwear","Activewear","Prints","Heritage","Swimwear","Surf","Menswear","Lingerie","Contemporary","Accessories","Ready-to-Wear"];

let geocodeTimer = null;
let focusedIdx = -1;

function resetMap() {
 markers.forEach(({pin}) => { if(pin) pin.classList.remove('dimmed','active'); });
 searchInput.value = '';
 searchClear.style.display = 'none';
 searchResults.style.display = 'none';
 focusedIdx = -1;
}

function dimAllExcept(names) {
 const nameSet = new Set(names);
 markers.forEach(({d, pin}) => {
 if(pin) pin.classList.toggle('dimmed', !nameSet.has(d.name));
 });
}

function showDropdown(sections) {
 if (!sections.length) {
 searchResults.innerHTML = '<div class="no-results">No results found</div>';
 searchResults.style.display = 'block';
 return;
 }
 let out = '';
 sections.forEach(function(sec) {
 out += '<div class="sri-section-header">' + sec.header + '</div>';
 sec.items.forEach(function(item) {
 out += '<div class="search-result-item" data-action-idx="' + item.actionIdx + '">';
 out += '<div class="sri-name">' + item.label + '</div>';
 if (item.meta) out += '<div class="sri-meta">' + item.meta + '</div>';
 out += '</div>';
 });
 });
 searchResults.innerHTML = out;
 searchResults.style.display = 'block';
}

// Build action list for keyboard nav
let currentActions = [];

function runSearch(q) {
 const query = q.trim().toLowerCase();
 searchClear.style.display = query ? 'block' : 'none';
 focusedIdx = -1;

 if (!query) {
 searchResults.style.display = 'none';
 markers.forEach(({pin}) => { if(pin) pin.classList.remove('dimmed'); });
 currentActions = [];
 return;
 }

 const sections = [];
 currentActions = [];

 // 1. Brand matches
 const uniqueBrands = [...new Map(DESIGNERS.filter(d =>
 d.name.toLowerCase().includes(query)
 ).map(d => [d.name, d])).values()];

 if (uniqueBrands.length > 0) {
 const items = uniqueBrands.slice(0, 6).map(d => {
 const locs = DESIGNERS.filter(x => x.name === d.name);
 const meta = locs.length > 1
 ? (locs.length + ' locations · ' + locs.map(function(l){ return l.addresses && l.addresses[0] ? l.addresses[0] : l.city; }).join(' & '))
 : (d.addresses && d.addresses[0] ? d.addresses[0] : d.city + ', Israel');
 const actionIdx = currentActions.length;
 currentActions.push(() => {
 searchInput.value = d.name;
 searchResults.style.display = 'none';
 dimAllExcept(locs.map(l => l.name));
 if (locs.length === 1) {
 const m = markers.find(x => x.d.name === d.name);
 if (m) { map.setView([d.lat, d.lng], 15, {animate:true}); setTimeout(() => m.marker.fire('click'), 500); }
 } else {
 // Fit all locations in view
 const bounds = L.latLngBounds(locs.map(l => [l.lat, l.lng]));
 map.fitBounds(bounds.pad(0.3), {animate:true});
 }
 markers.forEach(({pin}) => { if(pin) pin.classList.remove('dimmed'); });
 });
 return { label: d.name, meta, actionIdx };
 });
 sections.push({ header: 'Brands · ' + uniqueBrands.length + ' found', items });
 }

 // 2. Tag/style matches
 const tagMatches = ALL_TAGS.filter(t => t.toLowerCase().includes(query));
 if (tagMatches.length > 0) {
 const items = tagMatches.map(tag => {
 const tagCount = DESIGNERS.filter(d => d.tags.includes(tag)).length;
 const actionIdx = currentActions.length;
 currentActions.push(() => {
 searchInput.value = tag;
 searchResults.style.display = 'none';
 const matching = DESIGNERS.filter(d => d.tags.includes(tag)).map(d => d.name);
 dimAllExcept(matching);
 const bounds = L.latLngBounds(
 DESIGNERS.filter(d => d.tags.includes(tag)).map(d => [d.lat, d.lng])
 );
 map.fitBounds(bounds.pad(0.2), {animate:true});
 });
 return { label: tag, meta: tagCount + ' brands', actionIdx };
 });
 sections.push({ header: 'Styles', items });
 }

 // 3. Location suggestions (show immediately, geocode on select)
 const knownAreas = [
 {name:'Dizengoff', lat:32.0793, lng:34.7736, zoom:15},
 {name:'Sheinkin', lat:32.0638, lng:34.7720, zoom:16},
 {name:'Florentin', lat:32.0548, lng:34.7650, zoom:15},
 {name:'Neve Tzedek', lat:32.0565, lng:34.7560, zoom:15},
 {name:'Rothschild', lat:32.0626, lng:34.7745, zoom:15},
 {name:'Carmel Market', lat:32.0643, lng:34.7692, zoom:16},
 {name:'Jaffa', lat:32.0505, lng:34.7507, zoom:14},
 {name:'Tel Aviv', lat:32.0853, lng:34.7818, zoom:13},
 {name:'Jerusalem', lat:31.7767, lng:35.2345, zoom:13},
 {name:'Haifa', lat:32.7940, lng:34.9896, zoom:13},
 {name:'Herzliya', lat:32.1640, lng:34.8440, zoom:13},
 {name:'Ramat HaSharon', lat:32.1462, lng:34.8401, zoom:13},
 {name:'Ramat Aviv', lat:32.1102, lng:34.8027, zoom:14},
 {name:'North Tel Aviv', lat:32.1010, lng:34.7818, zoom:13},
 {name:'Pardes Hanna', lat:32.4710, lng:34.9620, zoom:13},
 ];
 const areaMatches = knownAreas.filter(a => a.name.toLowerCase().includes(query));
 // Also try geocode for unknowns
 const needsGeocode = areaMatches.length === 0 && uniqueBrands.length === 0 && tagMatches.length === 0;

 if (areaMatches.length > 0) {
 const items = areaMatches.map(area => {
 const RADIUS = area.zoom >= 15 ? 1 : area.zoom >= 14 ? 3 : 10;
 const nearby = DESIGNERS.filter(d => distKm(area.lat, area.lng, d.lat, d.lng) <= RADIUS);
 const actionIdx = currentActions.length;
 currentActions.push(() => {
 searchInput.value = area.name;
 searchResults.style.display = 'none';
 map.flyTo([area.lat, area.lng], area.zoom, {animate:true, duration:1.2});
 if (nearby.length > 0) {
 dimAllExcept(nearby.map(d => d.name));
 setTimeout(() => {
 markers.forEach(({pin}) => { if(pin) pin.classList.remove('dimmed'); });
 }, 8000);
 }
 });
 return { label: area.name, meta: nearby.length > 0 ? (nearby.length + ' brands nearby') : 'Area', actionIdx };
 });
 sections.push({ header: 'Areas', items });
 }

 if (needsGeocode) {
 // Show "Search for location" option
 const actionIdx = currentActions.length;
 currentActions.push(async () => {
 searchResults.innerHTML = '<div class="no-results">Searching…</div>';
 searchResults.style.display = 'block';
 try {
 const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + ', Israel')}&format=json&limit=1&countrycodes=il`, { headers: {'Accept-Language':'en'} });
 const data = await res.json();
 if (!data.length) { searchResults.innerHTML = '<div class="no-results">No location found</div>'; return; }
 const {lat, lon, display_name} = data[0];
 const placeLat = +lat, placeLng = +lon;
 const RADIUS = 10;
 const nearby = DESIGNERS.filter(d => distKm(placeLat, placeLng, d.lat, d.lng) <= RADIUS);
 map.flyTo([placeLat, placeLng], 14, {animate:true, duration:1.2});
 dimAllExcept(nearby.map(d => d.name));
 searchInput.value = display_name.split(',')[0];
 searchResults.style.display = 'none';
 } catch(e) { searchResults.innerHTML = '<div class="no-results">Could not find location</div>'; }
 });
 sections.push({ header: 'Location', items: [{ label: 'Search "' + q + '" on map', meta: 'Geocode search', actionIdx }] });
 }

 showDropdown(sections);

 // Wire up click handlers
 searchResults.querySelectorAll('.search-result-item').forEach(item => {
 item.addEventListener('click', () => {
 const idx = +item.dataset.actionIdx;
 if (currentActions[idx]) currentActions[idx]();
 });
 });
}

searchInput.addEventListener('input', e => runSearch(e.target.value));
searchClear.addEventListener('click', () => {
 searchInput.value = '';
 runSearch('');
 searchInput.focus();
});
document.addEventListener('click', e => {
 if (!e.target.closest('#map-search-wrap')) searchResults.style.display = 'none';
});

// Escape to clear
searchInput.addEventListener('keydown', e => {
 const items = searchResults.querySelectorAll('.search-result-item');
 if (e.key === 'Escape') { resetMap(); }
 else if (e.key === 'ArrowDown') {
 e.preventDefault();
 focusedIdx = Math.min(focusedIdx + 1, items.length - 1);
 items.forEach((el, i) => el.classList.toggle('focused', i === focusedIdx));
 } else if (e.key === 'ArrowUp') {
 e.preventDefault();
 focusedIdx = Math.max(focusedIdx - 1, 0);
 items.forEach((el, i) => el.classList.toggle('focused', i === focusedIdx));
 } else if (e.key === 'Enter' && focusedIdx >= 0) {
 e.preventDefault();
 items[focusedIdx]?.click();
 }
});

// Build location-first data model
function coordKey(lat, lng) {
 return Math.round(lat * 5000) / 5000 + ',' + Math.round(lng * 5000) / 5000;
}

// Only place pins for entries that have an actual street address.
// Brands without a confirmed address are still searchable but not pinned.
const locationMap = new Map();
DESIGNERS.forEach(function(d) {
 if (!d.addresses || !d.addresses.length) return;
 const key = coordKey(d.lat, d.lng);
 if (!locationMap.has(key)) {
 locationMap.set(key, { lat: d.lat, lng: d.lng, address: d.addresses[0], brands: [] });
 }
 locationMap.get(key).brands.push(d);
});

const locations = [...locationMap.values()];
let currentLocation = null;

function showLocationPanel(loc) {
 currentLocation = loc;
 const brandBody = document.getElementById('panel').querySelector('.panel-body:not(#loc-panel-body)');
 if (brandBody) brandBody.style.display = 'none';
 document.getElementById('panel-img-wrap').style.display = 'none';
 document.getElementById('location-panel').style.display = 'flex';
 document.getElementById('loc-back-btn').style.display = 'none';
 document.getElementById('loc-panel-img-wrap').innerHTML = '';
 const content = document.getElementById('loc-panel-content');
 let out = '<div class="loc-panel-header">' + loc.address + '</div>';
 out += '<div class="loc-panel-sub">' + loc.brands.length + ' brands at this address</div>';
 out += '<div style="margin-top:1.5rem">';
 loc.brands.forEach(function(d, i) {
 const thumb = d.img ? '<img class="loc-brand-thumb" src="' + d.img + '" alt="' + d.name + '"/>' : '<div class="loc-brand-thumb-placeholder"></div>';
 const tags = d.tags.slice(0, 2).map(function(t){ return '<span class="loc-brand-tag">' + t + '</span>'; }).join('');
 out += '<div class="loc-brand-row" data-bidx="' + i + '">' + thumb + '<div><div class="loc-brand-name">' + d.name + '</div><div class="loc-brand-tags">' + tags + '</div></div></div>';
 });
 out += '</div>';
 content.innerHTML = out;
 content.querySelectorAll('.loc-brand-row').forEach(function(row) {
 row.addEventListener('click', function() { showBrandFromLocation(loc.brands[+row.dataset.bidx]); });
 });
 panel.classList.add('open');
 document.getElementById('zoom-controls').style.right = (window.innerWidth < 600 ? '16px' : '416px');
}

function showBrandFromLocation(d) {
 document.getElementById('location-panel').style.display = 'none';
 document.getElementById('panel-img-wrap').style.display = '';
 const brandBody = document.getElementById('panel').querySelector('.panel-body:not(#loc-panel-body)');
 if (brandBody) brandBody.style.display = 'flex';
 document.getElementById('loc-back-btn').style.display = 'flex';
 openPanel(d);
}

// One marker per unique location
locations.forEach(function(loc) {
 const isSingle = loc.brands.length === 1;
 const sz = isSingle ? 10 : 14;
 const icon = L.divIcon({
 className: '',
 html: '<div class="map-pin"></div>',
 iconSize: [sz, sz],
 iconAnchor: [sz/2, sz/2],
 });
 const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
 loc.marker = marker;
 // push first brand for search compat
 markers.push({ d: loc.brands[0], marker, get pin() { return marker._icon?.querySelector('.map-pin'); } });

 // Click handler
 marker.on('click', function() {
 if (activeMarker && activeMarker !== marker) {
 activeMarker._icon?.querySelector('.map-pin')?.classList.remove('active');
 }
 activeMarker = marker;
 marker._icon?.querySelector('.map-pin')?.classList.add('active');
 if (loc.brands.length === 1) {
 document.getElementById('location-panel').style.display = 'none';
 document.getElementById('panel-img-wrap').style.display = '';
 const brandBody = document.getElementById('panel').querySelector('.panel-body:not(#loc-panel-body)');
 if (brandBody) brandBody.style.display = 'flex';
 document.getElementById('loc-back-btn').style.display = 'none';
 openPanel(loc.brands[0]);
 } else {
 showLocationPanel(loc);
 }
 const px = map.latLngToContainerPoint([loc.lat, loc.lng]);
 const offset = window.innerWidth < 600 ? 0 : 200;
 map.panTo(map.containerPointToLatLng(L.point(px.x - offset, px.y)), { animate: true });
 });

 // Label
 const labelText = loc.brands.length === 1 ? loc.brands[0].name : loc.brands.length + ' brands';
 const labelIcon = L.divIcon({
 className: 'map-label-div',
 html: '<span class="map-label">' + labelText + '</span>',
 iconSize: null, iconAnchor: [-10, 7],
 });
 L.marker([loc.lat, loc.lng], { icon: labelIcon, interactive: false, zIndexOffset: -1 }).addTo(map);

 // Hover tooltip
 const tipName = loc.brands.length === 1 ? loc.brands[0].name : loc.brands.length + ' brands';
 marker.bindTooltip(
 '<div class="tip-name">' + tipName + '</div><div class="tip-addr">' + loc.address + '</div>',
 { direction: 'top', offset: [0, -10], opacity: 1, className: 'map-hover-tip' }
 );
});

// Total pinned addresses (each location may host multiple brands)
const TOTAL_PINNED = locations.reduce((sum, l) => sum + l.brands.length, 0);
document.getElementById('map-count').textContent = TOTAL_PINNED + ' Locations';

// Show/hide labels based on zoom
const LABEL_MIN_ZOOM = 14;

function updateLabels() {
 const zoom = map.getZoom();
 // Show/hide permanent text labels
 document.querySelectorAll('.map-label-div').forEach(el => {
 el.style.display = zoom < LABEL_MIN_ZOOM ? 'none' : '';
 });
}

map.on('zoomend', updateLabels);
map.on('load', updateLabels);
setTimeout(updateLabels, 500);

// Auto-open brand from URL param
const urlParams = new URLSearchParams(window.location.search);
const brandParam = urlParams.get('brand');
if (brandParam) {
 const decoded = decodeURIComponent(brandParam).toLowerCase();
 const match = markers.find(m => m.d.name.toLowerCase() === decoded);
 if (match) {
 setTimeout(() => {
 map.setView([match.d.lat, match.d.lng], 15, { animate: true });
 setTimeout(() => match.marker.fire('click'), 600);
 }, 300);
 }
}

// Language support
const MAP_TRANSLATIONS = {
 en: {
 navDesigners: "Designers", navStores: "Stores", navMap: "Map", navAbout: "About", navSubmit: "Talk To Me",
 searchPlaceholder: "Brand, city, or style…",
 visitWebsite: "Visit Website",
 panelAddress: "", panelPhone: "", panelEmail: "", panelHours: "",
 nearby: (n, r) => `${n} brand${n !== 1 ? 's' : ''} nearby · within ${r}km`,
 searching: "Searching location…",
 noLocation: "No location found",
 noResults: "No results found",
 noNearby: "No brands in this area",
 countFn: (n) => `${n} Locations`,
 },
 he: {
 navDesigners: "מעצבים", navStores: "חנויות", navMap: "מפה", navAbout: "אודות", navSubmit: "דברו איתי",
 searchPlaceholder: "מותג, עיר, או סגנון…",
 visitWebsite: "לאתר",
 panelAddress: "", panelPhone: "", panelEmail: "", panelHours: "",
 nearby: (n, r) => `${n} מותגים בקרבת מקום · ברדיוס ${r} ק"מ`,
 searching: "מחפש מיקום…",
 noLocation: "לא נמצא מיקום",
 noResults: "לא נמצאו תוצאות",
 noNearby: "אין מותגים באזור זה",
 countFn: (n) => `${n} מיקומים`,
 }
};

let mapLang = 'en';

function applyMapLang() {
 const t = MAP_TRANSLATIONS[mapLang];
 const isHe = mapLang === 'he';
 document.documentElement.setAttribute('dir', isHe ? 'rtl' : 'ltr');
 document.documentElement.setAttribute('lang', isHe ? 'he' : 'en');

 document.getElementById('nav-designers').textContent = t.navDesigners;
 const navStoresEl = document.getElementById('nav-stores'); if (navStoresEl) navStoresEl.textContent = t.navStores;
 document.getElementById('nav-map').textContent = t.navMap;
 document.getElementById('nav-about').textContent = t.navAbout;
 document.getElementById('nav-submit').textContent = t.navSubmit;
 document.getElementById('map-search-input').placeholder = t.searchPlaceholder;
 document.getElementById('map-count').textContent = t.countFn(TOTAL_PINNED);

 // Update panel link if open
 const panelLink = document.getElementById('panel-link');
 if (panelLink) {
 const span = panelLink.querySelector('span.font-label, span:first-child');
 if (!span) panelLink.childNodes[0].textContent = t.visitWebsite + ' ';
 }
}

function toggleMapLang() {
 mapLang = mapLang === 'en' ? 'he' : 'en';
 document.getElementById('lang-toggle-map').textContent = mapLang === 'en' ? 'EN | עב' : 'עב | EN';
 applyMapLang();
}

// Sync lang from index if set
if (mapLang === 'he') {
 document.getElementById('lang-toggle-map').textContent = 'עב | EN';
 applyMapLang();
}
let mapMobileOpen = false;
const mapMobileMenu = document.getElementById('map-mobile-menu');

function toggleMapMobileMenu() {
 mapMobileOpen = !mapMobileOpen;
 if (mapMobileOpen) {
 mapMobileMenu.style.display = 'flex';
 requestAnimationFrame(() => { mapMobileMenu.style.transform = 'translateX(0)'; });
 document.body.style.overflow = 'hidden';
 } else {
 mapMobileMenu.style.transform = 'translateX(100%)';
 document.body.style.overflow = '';
 setTimeout(() => { mapMobileMenu.style.display = 'none'; }, 350);
 }
}

// Update map mobile menu lang
const _origApplyMapLang = applyMapLang;
applyMapLang = function() {
 _origApplyMapLang();
 const t = MAP_TRANSLATIONS[mapLang];
 const d = document.getElementById('mmenu-designers');
 const m = document.getElementById('mmenu-map');
 const a = document.getElementById('mmenu-about');
 const s = document.getElementById('mmenu-submit');
 if (d) d.textContent = t.navDesigners;
 const ms = document.getElementById('mmenu-stores'); if (ms) ms.textContent = t.navStores;
 if (m) m.textContent = t.navMap;
 if (a) a.textContent = t.navAbout;
 if (s) s.textContent = t.navSubmit;
};
