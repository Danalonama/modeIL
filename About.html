<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ModeIL — About</title>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&family=Inter:wght@300;400;600&family=Space+Grotesk:wght@300;400;700&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', sans-serif; background: #F4F4F4; color: #1A1A18; }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(244,244,244,0.96); backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(198,198,198,0.2);
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.5rem 3rem; height: 72px;
  }
  .nav-logo { font-family: 'Epilogue', sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: -0.04em; text-transform: uppercase; text-decoration: none; color: #000; }
  .nav-links { display: flex; gap: 2.5rem; font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; }
  .nav-links a { color: rgba(0,0,0,0.35); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: #000; }
  .nav-links a.active { color: #000; border-bottom: 2px solid #000; padding-bottom: 2px; }
  main {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 0 2rem;
  }
  .label {
    font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: rgba(0,0,0,0.4); margin-bottom: 2rem;
  }
  .hed {
    font-family: 'Epilogue', sans-serif; font-weight: 900; font-size: clamp(4rem, 14vw, 12rem);
    letter-spacing: -0.05em; line-height: 0.85; text-transform: uppercase; color: #000;
  }
  .sub {
    font-family: 'Inter', sans-serif; font-weight: 300; font-size: 1rem; line-height: 1.6;
    color: rgba(0,0,0,0.55); max-width: 460px; margin-top: 2.5rem;
  }
  .pulse { display: inline-block; width: 8px; height: 8px; background: #000; margin-right: 10px; animation: pulse 1.6s ease-in-out infinite; vertical-align: middle; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  @media (max-width: 720px) { .nav-links { display: none; } nav { padding: 1.25rem 1.5rem; } }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">ModeIL</a>
  <div class="nav-links">
    <a href="index.html">Designers</a>
    <a href="Stores.html">Stores</a>
    <a href="Map.html">Map</a>
    <a href="About.html" class="active">About</a>
    <a href="Submit.html">Submit</a>
  </div>
</nav>
<main>
  <div class="label"><span class="pulse"></span>About</div>
  <h1 class="hed">Coming<br/>Soon</h1>
  <p class="sub">A page about ModeIL — its mission, its makers, and the story behind the index — is on its way.</p>
</main>
</body>
</html>
