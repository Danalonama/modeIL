<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>ModeIL — About</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&amp;family=Inter:wght@300;400;600&amp;family=Space+Grotesk:wght@300;400;700&amp;family=Assistant:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: { extend: {
      colors: {
        "primary": "#000000", "background": "#F4F4F4", "on-background": "#1A1A18",
        "outline-variant": "#c6c6c6", "surface-container-high": "#EDE9E1"
      },
      borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
      fontFamily: {
        "headline": ["Epilogue", "sans-serif"],
        "body": ["Inter", "sans-serif"],
        "label": ["Space Grotesk", "sans-serif"]
      }
    }}
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  * { border-radius: 0px !important; }
  body { cursor: crosshair; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.012;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 200px;
  }
  main, nav, footer { position: relative; z-index: 1; }
  #lang-toggle { cursor: pointer; }
  *:focus-visible { outline: 2px solid #B8748A; outline-offset: 2px; }
  .pulse-dot { display: inline-block; width: 8px; height: 8px; background: #000; margin-right: 10px; animation: pulseAnim 1.6s ease-in-out infinite; vertical-align: middle; }
  @keyframes pulseAnim { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
</style>
</head>
<body class="bg-background text-primary font-body">

<!-- Nav -->
<nav class="fixed top-0 w-full z-50 bg-[#F4F4F4]/95 backdrop-blur-sm border-b border-[#1A1A18]/10 flex justify-between items-center px-8 md:px-12 py-6">
  <a href="index.html" class="font-headline font-black text-2xl tracking-tighter text-black uppercase">ModeIL</a>
  <div class="hidden md:flex items-center gap-12">
    <div class="flex gap-8 font-label uppercase tracking-widest text-sm">
      <a class="text-black/40 hover:text-black transition-colors duration-300" href="index.html">Designers</a>
      <a class="text-black/40 hover:text-black transition-colors duration-300" href="Stores.html">Stores</a>
      <a class="text-black/40 hover:text-black transition-colors duration-300" href="Map.html">Map</a>
      <a class="text-black border-b-2 border-black pb-1" href="About.html">About</a>
      <a class="text-black/40 hover:text-black transition-colors duration-300" href="Submit.html">Submit</a>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <button id="mobile-menu-btn" class="md:hidden flex items-center" onclick="toggleMobileMenu()">
      <span class="material-symbols-outlined text-black">menu</span>
    </button>
  </div>
</nav>

<!-- Mobile Menu Overlay -->
<div id="mobile-menu" class="fixed inset-0 bg-[#F4F4F4] z-[999] flex flex-col px-8 py-6 md:hidden" style="display:none!important;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);">
  <div class="flex justify-between items-center mb-16">
    <a href="index.html" class="font-headline font-black text-2xl tracking-tighter text-black uppercase">ModeIL</a>
    <button onclick="toggleMobileMenu()">
      <span class="material-symbols-outlined text-black">close</span>
    </button>
  </div>
  <nav class="flex flex-col gap-8">
    <a href="index.html" class="font-headline font-black text-5xl uppercase tracking-tighter text-black hover:opacity-40 transition-opacity border-b border-[#1A1A18]/10 pb-6">Designers</a>
    <a href="Stores.html" class="font-headline font-black text-5xl uppercase tracking-tighter text-black hover:opacity-40 transition-opacity border-b border-[#1A1A18]/10 pb-6">Stores</a>
    <a href="Map.html" class="font-headline font-black text-5xl uppercase tracking-tighter text-black hover:opacity-40 transition-opacity border-b border-[#1A1A18]/10 pb-6">Map</a>
    <a href="About.html" class="font-headline font-black text-5xl uppercase tracking-tighter text-black hover:opacity-40 transition-opacity border-b border-[#1A1A18]/10 pb-6">About</a>
    <a href="Submit.html" class="font-headline font-black text-5xl uppercase tracking-tighter text-black hover:opacity-40 transition-opacity pb-6">Submit</a>
  </nav>
</div>

<main class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-24">
  <div class="font-label text-[10px] tracking-[0.3em] uppercase text-black/40 mb-8"><span class="pulse-dot"></span>About</div>
  <h1 class="font-headline font-black uppercase tracking-tighter text-black leading-[0.85]" style="font-size: 82px">Coming<br/>Soon</h1>
  <p class="font-body font-light text-black/60 max-w-md mt-10 leading-relaxed">basically it's just me (Dana) checking out what's new in Israeli fashion...</p>
</main>

<script>
  function toggleMobileMenu() {
    const m = document.getElementById('mobile-menu');
    const isOpen = m.style.transform === 'translateX(0%)';
    if (isOpen) {
      m.style.transform = 'translateX(100%)';
      setTimeout(() => m.style.setProperty('display', 'none', 'important'), 350);
    } else {
      m.style.setProperty('display', 'flex', 'important');
      requestAnimationFrame(() => { m.style.transform = 'translateX(0%)'; });
    }
  }
</script>
</body>
</html>
